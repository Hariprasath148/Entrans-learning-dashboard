<!-- Main DashBoard Wrapper -->
<div class="dash-board-wrapper">
    <!-- DashBoard Navigaiton Bar  -->
    <div class="admin-tag">
        <!-- Admin Tag -->
        <p class="admin-tag-name">{{User.name}}</p>
        <!-- Profile and logout container -->
        <div class="profile-logout-container">
            <a [routerLink]="['/dashboard/viewUser',User.id]" class="profile"><i class="fas fa-user"></i></a>
            <button class="logout-btn" (click)="logout()">Logout</button>
        </div>
    </div>
    <!-- DashBoard Wrapper -->
    <div class="dash-board-main">
        <div class="side-bar-wrapper" [class.side-bar-close]="isSideBar">
            <div class="side-bar">
                <a routerLink="/dashboard" class="side-bar-link" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"><i class="fa-solid fa-list"></i>List User</a>
                <a *ngIf="User.role === 'Admin'" routerLink="/dashboard/addUser" class="side-bar-link" routerLinkActive="active" ><i class="fa-solid fa-user-plus"></i>Add User</a>
                <a routerLink="/dashboard/questionPaper" class="side-bar-link" routerLinkActive="active" ><i class="fa-regular fa-file"></i>Question Papers</a>
                <a routerLink="/dashboard/chat" class="side-bar-link" routerLinkActive="active" ><i class="fa-solid fa-comments"></i>Chat</a>
            </div>
            <button class="side-bar-nav-btn" (click)="isSideBar = !isSideBar"><i *ngIf="!isSideBar" class="fa-solid fa-angle-left"></i><i *ngIf="isSideBar" class="fa-solid fa-angle-right"></i></button>
        </div>
        <div class="router-wrapper">
            <!-- Main Outlet contianer -->
            <div class="router-container">
                <router-outlet></router-outlet>
            </div>
        </div>
    </div>
</div>
