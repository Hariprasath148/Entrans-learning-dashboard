<div class="error-page-wrapper">
  <!-- Background decorative elements -->
  <div class="decoration decoration-1"></div>
  <div class="decoration decoration-2"></div>
  <div class="decoration decoration-3"></div>

  <!-- Main error content -->
  <div class="error-container fade-in">
    <!-- Error code -->
    <div class="error-code">404</div>

    <!-- Error icon -->
    <div class="error-icon">
      <i class="fas fa-exclamation-triangle"></i>
    </div>

    <!-- Title -->
    <h1 class="error-title">Page Not Found</h1>

    <!-- Message -->
    <p class="error-message">
      Oops! The page you're looking for doesn't exist or has been removed.
    </p>

    <!-- Additional info -->
    <p class="error-hint">
      Let us help you navigate back to safety
    </p>

    <!-- Action buttons -->
    <div class="action-buttons">
      <button class="btn btn-primary" (click)="goBackToDashboard()">
        <i class="fas fa-home"></i> Go Back to Dashboard
      </button>
      <button class="btn btn-secondary" (click)="retry()">
        <i class="fas fa-redo"></i> Retry
      </button>
    </div>

    <!-- Countdown timer (optional) -->
    <div class="countdown" *ngIf="showCountdown">
      Redirecting in <strong>{{ countdownSeconds }}</strong> seconds...
    </div>
  </div>
</div>
